<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Managements</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col shadow">
                <div class="card-header">
                    <h3 class="text-center bg-warning">User Management</h3>
                </div>
                <div class="card-body ">
                    <form action="" id="userform">
                       
                        <input type="hidden" id="userid">

                        <div class="form-group">
                            <label for="username" class="font-weight-bold">User Name <sup>*</sup></label>
                            <input type="text" class="form-control" id="username" placeholder="Enter You Name" required>
                        </div>
                        <div class="form-group">
                            <label for="email" class="font-weight-bold">User Email <sup>*</sup></label> 
                            <input type="email" class="form-control" id="email" placeholder="Enter your Email" required>
                        </div>
                        <div class="form-group">
                            <label for="contact" class="font-weight-bold">Contact <sup>*</sup></label>
                            <input type="number" class="form-control" id="contact" placeholder="Enter your Contact Number" required>
                        </div>
                        <div class="d-flex justify-content-center align-items-center">
                         <button type="submit" class="btn btn-block btn-sm btn-success " id="adduser">Add USer</button>
                        <button type="button" class="btn btn-block btn-sm btn-warning btn-block d-none" id="updateuser">Update User</button>
                        </div>
                        

                    </form>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-md-12 md-6">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h3 class="text-center ">User Details</h3>
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered table-danger">
                            <thead>
                                <tr>
                                    <th>Sr No</th>
                                     <th >User Name</th>
                                     <th >User Email</th>
                                     <th >User Contact</th>
                                     <th>Edit</th>
                                     <th>Remove</th>
                                </tr>
                            </thead>
                            <tbody id="usercontainer">
                                <!-- <tr>
                                    <td>Id</td>
                                    <td>mansi</td>
                                    <td>mansi@123</td>
                                    <td>883037460</td>
                                    <td>edit</td>
                                    <td>delete</td>
                                </tr> -->
                            </tbody>

                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="spinner d-none" id="spinner">
        <div class="spinner-border text-primary " role="status">
  <span class="sr-only">Loading...</span>
</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
   <script type="module" src="/app.js"></script>
</body>
</html>
